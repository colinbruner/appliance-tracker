# ---------------------------------------------------------------------------
# 1Password Kubernetes Operator — OnePasswordItem
#
# The operator watches this resource and creates/syncs a k8s Secret of the
# same name (appliance-tracker-oidc) in the same namespace.
#
# Create the corresponding item in 1Password with these fields:
#
#   Vault:  <your vault name, e.g. "HomeLab">
#   Item:   appliance-tracker-oidc
#   Fields:
#     OIDC_AUTHORITY  (text)   — e.g. https://accounts.google.com
#     OIDC_CLIENT_ID  (text)   — your OAuth 2.0 client ID
#
# Adjust spec.itemPath to match your vault name / item name / item ID.
# Using item name:  "vaults/HomeLab/items/appliance-tracker-oidc"
# Using vault + item ID: "vaults/<vault-id>/items/<item-id>"
# ---------------------------------------------------------------------------
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: appliance-tracker-oidc
  namespace: appliance-tracker
  labels:
    app.kubernetes.io/name: appliance-tracker
    app.kubernetes.io/component: secret
spec:
  itemPath: "vaults/HomeLab/items/appliance-tracker-oidc"
