# ---------------------------------------------------------------------------
# Ingress — nginx ingress controller (common homelab setup)
#
# Customise before applying:
#   1. Replace "appliances.home.example.com" with your actual hostname
#   2. If using cert-manager, uncomment the TLS + annotation blocks
#   3. If your ingress class has a different name, update ingressClassName
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appliance-tracker
  namespace: appliance-tracker
  labels:
    app.kubernetes.io/name: appliance-tracker
    app.kubernetes.io/component: web
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # Uncomment to issue a Let's Encrypt certificate via cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: appliances.home.example.com   # TODO: set your hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appliance-tracker
                port:
                  name: http
  # Uncomment and update once cert-manager / TLS is in place:
  # tls:
  #   - hosts:
  #       - appliances.home.example.com
  #     secretName: appliance-tracker-tls
