apiVersion: apps/v1
kind: Deployment
metadata:
  name: appliance-tracker
  namespace: appliance-tracker
  labels:
    app.kubernetes.io/name: appliance-tracker
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: appliance-tracker
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: appliance-tracker
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user in nginx:alpine
        runAsGroup: 101

      containers:
        - name: web
          # TODO: replace with your registry/image, e.g.:
          #   ghcr.io/<your-org>/appliance-tracker:latest
          #   registry.local/appliance-tracker:1.0.0
          image: appliance-tracker:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # OIDC config injected at container start from the 1Password-synced Secret.
          # The entrypoint script substitutes these into the compiled JS bundle.
          env:
            - name: OIDC_AUTHORITY
              valueFrom:
                secretKeyRef:
                  name: appliance-tracker-oidc
                  key: OIDC_AUTHORITY
                  optional: true   # allow demo mode when secret is absent
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: appliance-tracker-oidc
                  key: OIDC_CLIENT_ID
                  optional: true

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10

          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # nginx needs /var/cache/nginx writes
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
