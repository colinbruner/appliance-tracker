name: Test

on:
  push:
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "TODO.md"
  pull_request:
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - "TODO.md"

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-check:
    name: Build Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (no secrets)
        run: npm run build
