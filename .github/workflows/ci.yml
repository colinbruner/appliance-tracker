name: Deploy to GCS

on:
  push:
    branches:
      - main
    paths-ignore:
      - "LICENSE"
      - "README.md"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_OIDC_AUTHORITY: ${{ secrets.OIDC_AUTHORITY }}
          VITE_OIDC_CLIENT_ID: ${{ secrets.OIDC_CLIENT_ID }}
        run: npm run build

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.PROVIDER_NAME }}
          service_account: ${{ secrets.SA_EMAIL }}

      - name: Sync to GCS bucket
        run: |
          gcloud storage rsync build/ gs://appliances.bruner.family \
            --recursive \
            --delete-unmatched-destination-objects
